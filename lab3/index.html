<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="CSS/style.css">
  <script src="http://d3js.org/d3.v7.min.js"> </script>
  <script src="JavaScript/data.js"></script>
    <script src="JavaScript/table.js"></script>
  <script src="JavaScript/chart.js"></script>
  <script src="JavaScript/main.js"></script>
</head>
<body>   
  <h3>Список самых высоких зданий</h3>
<form name="setting" id="graphForm">
  <p>Значение по оси OX</p>

  <label>
    <input type="radio" name="ox" value="Страна" checked>
    Страна
  </label>
  <br>

  <label>
    <input type="radio" name="ox" value="Год">
    Год
  </label>

  <p>Значение по оси OY</p>

  <label>
    <input type="checkbox" name="max">
    Максимальная высота
  </label>
  <br>

  <label>
    <input type="checkbox" name="min">
    Минимальная высота
  </label>

  <!-- сообщение об ошибке -->
  <p id="errorOY" class="error hidden">Выберите хотя бы одно значение по оси OY</p>

  <p>
    Тип графика
    <select name="chartType">
      <option value="point">Точечная диаграмма</option>
      <option value="bar">Гистограмма</option>
    </select>
  </p>

  <input type="button" id="buildBtn" value="Построить">
</form>

<svg></svg>
<p>
    <button id="toggleTable">Скрыть таблицу</button>
</p>
  
  <table id="build"> 
  </table>
</body>
</html>
