<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>Практическое задание 2</title>
    <link rel="stylesheet" href="CSS/style.css">

    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="JavaScript/image.js"></script>
    <script src="JavaScript/main.js" defer></script>
</head>
<body>
    <form id="setting">
        <div id="horiz">
            <p>
                Время анимации<br>
                <label for="duration">мс:</label>
                <input type="number" id="duration" value="6000" min="100">
            </p>

            <p>
                Масштаб<br>
                <label for="scaleStart">от:</label>
                <input type="number" id="scaleStart" value="1" step="0.1"><br>
                <label for="scaleEnd">до:</label>
                <input type="number" id="scaleEnd" value="1" step="0.1">
            </p>

            <p>
                Поворот<br>
                <label for="angleStart">от:</label>
                <input type="number" id="angleStart" value="0"><br>
                <label for="angleEnd">до:</label>
                <input type="number" id="angleEnd" value="0">
            </p>
        </div>

        <p id="buttonBlock">
            <input type="button" id="animateBtn" value="Запустить анимацию">
            <input type="button" id="clearBtn" value="Очистить">
        </p>
    </form>

    <svg width="800" height="600"></svg>
</body>
</html>
